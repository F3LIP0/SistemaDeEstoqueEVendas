name: web-ci

on:
  push:
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'

jobs:
  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Health check (backend up)
        run: |
          node backend.js > /tmp/web-backend.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/api/health > /dev/null; then
              echo 'Backend online'
              exit 0
            fi
            sleep 1
          done
          echo 'Backend nao subiu a tempo'
          cat /tmp/web-backend.log || true
          exit 1

      - name: Run full test suite
        run: npm run test:all:raw
